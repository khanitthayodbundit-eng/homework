<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class & Homework Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ตารางเรียนม.2/4">
    <link class="ios-icon" rel="apple-touch-icon" href="https://raw.githubusercontent.com/khanitthayodbundit-eng/homework/refs/heads/main/icon.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5ufCK1MfakgMnfE9B0ZnQLlTUfpnDirQ",
            authDomain: "myhomework-4621e.firebaseapp.com",
            databaseURL: "https://myhomework-4621e-default-rtdb.firebaseio.com",
            projectId: "myhomework-4621e",
            storageBucket: "myhomework-4621e.firebasestorage.app",
            messagingSenderId: "993446656066",
            appId: "1:993446656066:web:11174ba8bc0e9ff44095db",
            measurementId: "G-Q5KH4YZ1LD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbPush = push;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
        window.firebaseReady = true;
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="max-w-4xl mx-auto w-full mb-6">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📅 Class & Homework Tracker</h1>
                <p class="text-sm text-gray-500">ตารางเรียน ชั้น ม. 2/4 ห้องประจำ 646 (ระบบอัปเดตแบบ Realtime ทั้งห้อง)</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="openScheduleBtn" onclick="window.openModal('scheduleModal')" class="flex-1 sm:flex-initial bg-amber-500 hover:bg-amber-600 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition cursor-pointer text-sm hidden">
                    + เพิ่มวิชาเรียน
                </button>
                <button id="openHomeworkBtn" onclick="window.openModal('homeworkModal')" class="flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition cursor-pointer text-sm">
                    + เพิ่มการบ้าน
                </button>
            </div>
        </header>

        <nav class="flex bg-white p-2 rounded-2xl shadow-md mb-6 overflow-x-auto gap-2 border border-slate-200">
            <button onclick="window.selectDay('Monday')" id="tab-Monday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💛 จันทร์</button>
            <button onclick="window.selectDay('Tuesday')" id="tab-Tuesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💗 อังคาร</button>
            <button onclick="window.selectDay('Wednesday')" id="tab-Wednesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💚 พุธ</button>
            <button onclick="window.selectDay('Thursday')" id="tab-Thursday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">🧡 พฤหัสฯ</button>
            <button onclick="window.selectDay('Friday')" id="tab-Friday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💙 ศุกร์</button>
        </nav>

        <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
            <section class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📖 ตารางเรียน</h2>
                <div id="scheduleList" class="space-y-3"></div>
            </section>

            <section class="md:col-span-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🔥 การบ้าน/ภารกิจ</h2>
                <div id="homeworkList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="scheduleModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-200">
            <h3 id="scheduleModalTitle" class="text-lg font-bold text-slate-800 mb-4">📖 เพิ่มวิชาเรียน</h3>
            <form id="scheduleForm" onsubmit="window.scheduleForm_submit(event)">
                <input type="hidden" id="scheduleId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">วันเรียน</label>
                        <select id="scheduleDay" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-indigo-600" required>
                            <option value="Monday">วันจันทร์</option>
                            <option value="Tuesday">วันอังคาร</option>
                            <option value="Wednesday">วันพุธ</option>
                            <option value="Thursday">วันพฤหัสบดี</option>
                            <option value="Friday">วันศุกร์</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1">
                            <label class="block text-xs font-bold text-slate-600 mb-1">รหัสวิชา</label>
                            <input type="text" id="scheduleCode" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" placeholder="ท22101">
                        </div>
                        <div class="col-span-2">
                            <label class="block text-xs font-bold text-slate-600 mb-1">ชื่อวิชา</label>
                            <input type="text" id="scheduleName" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" placeholder="ภาษาไทย" required>
                        </div>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">ครูผู้สอน</label>
                        <input type="text" id="scheduleTeacher" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" placeholder="ครูผู้สอน">
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">เวลาเริ่ม</label>
                            <input type="time" id="scheduleStart" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" required>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">เวลาสิ้นสุด</label>
                            <input type="time" id="scheduleEnd" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" required>
                        </div>
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="window.closeModal('scheduleModal')" class="flex-1 py-2 text-sm font-medium text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-2 text-sm font-medium text-white bg-amber-500 hover:bg-amber-600 rounded-xl shadow-md transition">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="homeworkModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-200 max-h-[90vh] overflow-y-auto">
            <h3 id="homeworkModalTitle" class="text-lg font-bold text-slate-800 mb-4">🔥 เพิ่มการบ้าน / ภารกิจ</h3>
            <form id="homeworkForm" onsubmit="window.homeworkForm_submit(event)">
                <input type="hidden" id="homeworkId">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">วิชาเรียน (อิงจากตารางเรียนวันนี้)</label>
                        <select id="homeworkSubjectSelect" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-indigo-600" required></select>
                    </div>
                    
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">ประเภทงาน</label>
                        <select id="homeworkType" onchange="window.toggleGroupFields(this.value)" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-indigo-600" required>
                            <option value="single">👤 งานเดี่ยว</option>
                            <option value="group">👥 งานกลุ่ม</option>
                        </select>
                    </div>

                    <div id="groupFields" class="hidden space-y-4 bg-slate-50 p-3 rounded-xl border border-slate-200">
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">จำนวนสมาชิกในกลุ่ม (คน)</label>
                            <input type="number" id="groupMemberCount" min="1" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-white focus:outline-indigo-600" placeholder="เช่น 4">
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-slate-600 mb-1">รายชื่อสมาชิก</label>
                            <textarea id="groupMemberNames" rows="2" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-white focus:outline-indigo-600" placeholder="เช่น นาย A, นาย B, นาย C, นาย D"></textarea>
                        </div>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">สถานะการบ้าน</label>
                        <select id="homeworkStatus" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-indigo-600" required>
                            <option value="not-started">🔴 ยังไม่เริ่ม</option>
                            <option value="in-progress">🟡 กำลังทำ</option>
                            <option value="done">🟢 เสร็จแล้ว</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">รายละเอียดงาน</label>
                        <textarea id="homeworkTitle" rows="3" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" placeholder="เช่น ทำแบบฝึกหัดหน้า 20 ข้อ 1-5" required></textarea>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-600 mb-1">กำหนดส่ง</label>
                        <input type="date" id="homeworkDeadline" class="w-full text-sm p-2 rounded-lg border border-slate-200 focus:outline-indigo-600" required>
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="window.closeModal('homeworkModal')" class="flex-1 py-2 text-sm font-medium text-slate-500 bg-slate-100 hover:bg-slate-200 rounded-xl transition">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-2 text-sm font-medium text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md transition">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="w-full text-center py-6 border-t border-slate-200 flex flex-col items-center justify-center gap-3">
        <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-xs border border-slate-200">
            <label for="userRoleSelect" class="text-xs font-bold text-slate-600">🔐 สิทธิ์ผู้ใช้งาน:</label>
            <select id="userRoleSelect" onchange="window.changeUserRole(this.value)" class="text-xs font-bold text-indigo-600 focus:outline-none cursor-pointer bg-slate-50 px-2 py-1 rounded-lg border border-slate-200">
                <option value="student">👤 ผู้ใช้ทั่วไป (จัดการเฉพาะการบ้าน)</option>
                <option value="admin">👑 Admin (จัดการได้ทั้งหมด)</option>
            </select>
        </div>
        <p class="text-[11px] text-gray-400 font-medium">© 2026 ม.2/4 · ระบบฐานข้อมูลออนไลน์แบบเรียลไทม์ผ่าน Firebase</p>
    </footer>

    <script>
        let currentSelectedDay = 'Monday';
        let currentUserRole = localStorage.getItem('userRole') || 'student';
        let schedules = [];
        let homeworks = [];

        window.changeUserRole = function(role) {
            currentUserRole = role;
            localStorage.setItem('userRole', role);
            const btn = document.getElementById('openScheduleBtn');
            if (role === 'admin') {
                btn.classList.remove('hidden');
            } else {
                btn.classList.add('hidden');
            }
            renderSchedule();
            renderHomework();
        }

        window.toggleGroupFields = function(type) {
            const groupFields = document.getElementById('groupFields');
            if (type === 'group') {
                groupFields.classList.remove('hidden');
            } else {
                groupFields.classList.add('hidden');
            }
        }

        window.openModal = function(id) {
            document.getElementById(id).classList.remove('hidden');
        }

        window.closeModal = function(id) {
            document.getElementById(id).classList.add('hidden');
        }

        window.selectDay = function(day) {
            currentSelectedDay = day;
            document.querySelectorAll('.day-tab').forEach(tab => {
                tab.className = "day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs bg-white text-slate-700 border border-slate-200";
            });
            document.getElementById(`tab-${day}`).className = `day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-md scale-105 bg-indigo-500 text-white`;
            
            renderSchedule();
            updateHomeworkSubjectSelect();
            renderHomework();
        }

        window.setupDefaultDayByCurrentDate = function() {
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const today = days[new Date().getDay()];
            currentSelectedDay = (today !== 'Sunday' && today !== 'Saturday') ? today : 'Monday';
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleList');
            const todayClasses = schedules.filter(c => c.day === currentSelectedDay);
            if(todayClasses.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-6 text-sm">ไม่มีวิชาเรียนในวันนี้</p>`;
                return;
            }
            container.innerHTML = todayClasses.map(c => `
                <div class="p-3 bg-slate-50 border-l-4 border-indigo-500 rounded-xl flex justify-between items-center shadow-xs">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${c.name}</p>
                        <p class="text-xs text-slate-500 mt-1">ผู้สอน: ${c.teacher}</p>
                        <p class="text-[11px] text-slate-600 font-bold mt-0.5">⏰ ${c.start} - ${c.end} น.</p>
                    </div>
                </div>`).join('');
        }

        function renderHomework() {
            const container = document.getElementById('homeworkList');
            const todayHomeworks = homeworks.filter(h => h.day === currentSelectedDay);
            if(todayHomeworks.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-12 text-sm">🎉 ไม่มีภารกิจในวันนี้</p>`;
                return;
            }
            container.innerHTML = todayHomeworks.map(h => `
                <div class="p-4 bg-white border border-slate-200 rounded-xl shadow-xs">
                    <p class="font-bold text-indigo-700 text-sm">${h.subject}</p>
                    <p class="text-sm text-slate-800 font-medium mt-1">${h.title}</p>
                    ${h.type === 'group' ? `<p class="text-[11px] text-slate-500 mt-1 bg-slate-50 p-1.5 rounded-lg">👥 งานกลุ่ม (${h.memberCount} คน): ${h.memberNames}</p>` : ''}
                </div>`).join('');
        }

        function updateHomeworkSubjectSelect() {
            const select = document.getElementById('homeworkSubjectSelect');
            const todayClasses = schedules.filter(c => c.day === currentSelectedDay);
            select.innerHTML = todayClasses.map(c => `<option value="${c.name}">${c.name}</option>`).join('') + `<option value="งานทั่วไป">งานทั่วไป</option>`;
        }

        window.scheduleForm_submit = function(e) { e.preventDefault(); /* Logic บันทึก */ closeModal('scheduleModal'); };
        window.homeworkForm_submit = function(e) { e.preventDefault(); /* Logic บันทึก */ closeModal('homeworkModal'); };

        function checkFirebaseReady() {
            if (window.firebaseReady) {
                window.setupDefaultDayByCurrentDate();
                window.selectDay(currentSelectedDay);
                window.dbOnValue(window.dbRef(window.db, 'schedules'), (s) => { schedules = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); renderSchedule(); });
                window.dbOnValue(window.dbRef(window.db, 'homeworks'), (s) => { homeworks = Object.entries(s.val()||{}).map(([id,v])=>({id,...v})); renderHomework(); });
            } else { setTimeout(checkFirebaseReady, 100); }
        }
        checkFirebaseReady();
    </script>
</body>
</html>
