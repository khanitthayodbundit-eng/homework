<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class & Homework Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ตารางเรียนม.2/4">
    <link class="ios-icon" rel="apple-touch-icon" href="https://raw.githubusercontent.com/khanitthayodbundit-eng/homework/refs/heads/main/icon.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5ufCK1MfakgMnfE9B0ZnQLlTUfpnDirQ",
            authDomain: "myhomework-4621e.firebaseapp.com",
            databaseURL: "https://myhomework-4621e-default-rtdb.firebaseio.com",
            projectId: "myhomework-4621e",
            storageBucket: "myhomework-4621e.firebasestorage.app",
            messagingSenderId: "993446656066",
            appId: "1:993446656066:web:11174ba8bc0e9ff44095db",
            measurementId: "G-Q5KH4YZ1LD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbPush = push;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="max-w-4xl mx-auto w-full mb-6">
        
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📅 Class & Homework Tracker</h1>
                <p class="text-sm text-gray-500">ตารางเรียน ชั้น ม. 2/4 ห้องประจำ 646 (ระบบอัปเดตแบบ Realtime ทั้งห้อง)</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button onclick="window.showAllHomework()" class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition text-sm">📊 สรุปทั้งหมด</button>
                <button id="openScheduleBtn" onclick="window.openModal('scheduleModal')" class="flex-1 sm:flex-initial bg-amber-500 hover:bg-amber-600 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition cursor-pointer text-sm hidden">
                    + เพิ่มวิชาเรียน
                </button>
                <button id="openHomeworkBtn" onclick="window.openModal('homeworkModal')" class="flex-1 sm:flex-initial bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition cursor-pointer text-sm">
                    + เพิ่มการบ้าน
                </button>
            </div>
        </header>

        <nav class="flex bg-white p-2 rounded-2xl shadow-md mb-6 overflow-x-auto gap-2 border border-slate-200">
            <button onclick="window.selectDay('Monday')" id="tab-Monday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💛 จันทร์</button>
            <button onclick="window.selectDay('Tuesday')" id="tab-Tuesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💗 อังคาร</button>
            <button onclick="window.selectDay('Wednesday')" id="tab-Wednesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💚 พุธ</button>
            <button onclick="window.selectDay('Thursday')" id="tab-Thursday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">🧡 พฤหัสฯ</button>
            <button onclick="window.selectDay('Friday')" id="tab-Friday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs">💙 ศุกร์</button>
        </nav>

        <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
            <section class="md:col-span-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🔥 การบ้าน/ภารกิจ</h2>
                <div id="homeworkList" class="space-y-3"></div>
            </section>
            <section class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📖 ตารางเรียน</h2>
                <div id="scheduleList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="summaryModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm hidden z-50 flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-lg w-full p-6 shadow-xl max-h-[85vh] overflow-y-auto">
            <h3 class="text-lg font-bold text-slate-800 mb-4">📝 สรุปการบ้านทั้งหมด</h3>
            <div id="allHomeworkList" class="space-y-3"></div>
            <button onclick="window.closeModal('summaryModal')" class="mt-6 w-full py-2 bg-slate-100 rounded-xl font-bold text-sm text-slate-600">ปิด</button>
        </div>
    </div>

    <div id="scheduleModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-200">
            <h3 id="scheduleModalTitle" class="text-lg font-bold text-slate-800 mb-4">📖 เพิ่มวิชาเรียน</h3>
            <form id="scheduleForm" onsubmit="window.scheduleForm_submit(event)">
                <input type="hidden" id="scheduleId">
                <div class="space-y-4">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">วันเรียน</label><select id="scheduleDay" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50 focus:outline-indigo-600" required><option value="Monday">วันจันทร์</option><option value="Tuesday">วันอังคาร</option><option value="Wednesday">วันพุธ</option><option value="Thursday">วันพฤหัสบดี</option><option value="Friday">วันศุกร์</option></select></div>
                    <div class="grid grid-cols-3 gap-2">
                        <div class="col-span-1"><label class="block text-xs font-bold text-slate-600 mb-1">รหัส</label><input type="text" id="scheduleCode" class="w-full text-sm p-2 rounded-lg border border-slate-200" placeholder="ท22101"></div>
                        <div class="col-span-2"><label class="block text-xs font-bold text-slate-600 mb-1">ชื่อวิชา</label><input type="text" id="scheduleName" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></div>
                    </div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">ครูผู้สอน</label><input type="text" id="scheduleTeacher" class="w-full text-sm p-2 rounded-lg border border-slate-200"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <div><label class="block text-xs font-bold text-slate-600 mb-1">เริ่ม</label><input type="time" id="scheduleStart" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></div>
                        <div><label class="block text-xs font-bold text-slate-600 mb-1">จบ</label><input type="time" id="scheduleEnd" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></div>
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="window.closeModal('scheduleModal')" class="flex-1 py-2 text-sm text-slate-500 bg-slate-100 rounded-xl">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-2 text-sm text-white bg-amber-500 rounded-xl">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <div id="homeworkModal" class="fixed inset-0 bg-slate-900/50 backdrop-blur-xs flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl border border-slate-200 max-h-[90vh] overflow-y-auto">
            <h3 id="homeworkModalTitle" class="text-lg font-bold text-slate-800 mb-4">🔥 เพิ่มการบ้าน / ภารกิจ</h3>
            <form id="homeworkForm" onsubmit="window.homeworkForm_submit(event)">
                <input type="hidden" id="homeworkId">
                <div class="space-y-4">
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">วิชา</label><select id="homeworkSubjectSelect" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50" required></select></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">ประเภท</label><select id="homeworkType" onchange="window.toggleGroupFields(this.value)" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50"><option value="single">👤 งานเดี่ยว</option><option value="group">👥 งานกลุ่ม</option></select></div>
                    <div id="groupFields" class="hidden space-y-4 bg-slate-50 p-3 rounded-xl border"><input type="number" id="groupMemberCount" placeholder="จำนวนคน" class="w-full text-sm p-2 rounded-lg border"><textarea id="groupMemberNames" rows="2" placeholder="รายชื่อสมาชิก" class="w-full text-sm p-2 rounded-lg border"></textarea></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">สถานะ</label><select id="homeworkStatus" class="w-full text-sm p-2 rounded-lg border border-slate-200 bg-slate-50"><option value="not-started">🔴 ยังไม่เริ่ม</option><option value="in-progress">🟡 กำลังทำ</option><option value="done">🟢 เสร็จแล้ว</option></select></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">รายละเอียด</label><textarea id="homeworkTitle" rows="3" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></textarea></div>
                    <div><label class="block text-xs font-bold text-slate-600 mb-1">กำหนดส่ง</label><input type="date" id="homeworkDeadline" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="window.closeModal('homeworkModal')" class="flex-1 py-2 text-sm text-slate-500 bg-slate-100 rounded-xl">ยกเลิก</button>
                    <button type="submit" class="flex-1 py-2 text-sm text-white bg-indigo-600 rounded-xl">บันทึก</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="w-full text-center py-6 border-t border-slate-200 flex flex-col items-center justify-center gap-3">
        <div class="flex items-center gap-2 bg-white px-4 py-2 rounded-xl shadow-xs border border-slate-200">
            <label for="userRoleSelect" class="text-xs font-bold text-slate-600">🔐 สิทธิ์:</label>
            <select id="userRoleSelect" onchange="window.changeUserRole(this.value)" class="text-xs font-bold text-indigo-600 focus:outline-none cursor-pointer bg-slate-50 px-2 py-1 rounded-lg border border-slate-200"><option value="student">👤 ผู้ใช้ทั่วไป</option><option value="admin">👑 Admin</option></select>
        </div>
        <p class="text-[11px] text-gray-400 font-medium">© 2026 ม.2/4 · ระบบฐานข้อมูลออนไลน์ผ่าน Firebase</p>
    </footer>

    <script>
        let currentSelectedDay = 'Monday';
        let currentUserRole = localStorage.getItem('userRole') || 'student';
        let schedules = [];
        let homeworks = [];

        // ฟังก์ชันใหม่: สรุปการบ้าน
        window.showAllHomework = function() {
            const list = document.getElementById('allHomeworkList');
            const today = new Date().toISOString().split('T')[0];
            const sorted = [...homeworks].sort((a, b) => new Date(a.deadline) - new Date(b.deadline));
            
            list.innerHTML = sorted.length === 0 ? '<p class="text-center text-gray-400 py-4">ไม่มีข้อมูลการบ้าน</p>' : sorted.map(h => {
                const isUrgent = h.deadline <= today && h.status !== 'done';
                return `
                    <div class="p-3 border rounded-xl ${isUrgent ? 'border-red-500 border-2' : 'border-slate-200'} ${h.status === 'done' ? 'bg-emerald-50' : 'bg-white'}">
                        <div class="flex justify-between items-start">
                            <p class="font-bold text-sm ${h.status === 'done' ? 'line-through text-gray-400' : ''}">${h.title}</p>
                            <span class="text-[10px] px-2 py-0.5 rounded ${h.status === 'done' ? 'bg-emerald-200' : 'bg-amber-200'}">${h.status}</span>
                        </div>
                        <p class="text-[11px] text-gray-500 mt-1">${h.subject} | ส่ง: ${h.deadline} ${isUrgent ? '⚠️ ด่วน!' : ''}</p>
                    </div>`;
            }).join('');
            window.openModal('summaryModal');
        }

        window.changeUserRole = function(role) {
            currentUserRole = role;
            localStorage.setItem('userRole', role);
            document.getElementById('openScheduleBtn').classList.toggle('hidden', role !== 'admin');
            renderSchedule(); renderHomework();
        }

        window.toggleGroupFields = function(type) { document.getElementById('groupFields').classList.toggle('hidden', type !== 'group'); }
        window.openModal = function(id) { document.getElementById(id).classList.remove('hidden'); }
        window.closeModal = function(id) { document.getElementById(id).classList.add('hidden'); }

        window.selectDay = function(day) {
            currentSelectedDay = day;
            document.querySelectorAll('.day-tab').forEach(t => t.className = "day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-xs bg-white text-slate-700 border border-slate-200");
            const activeColors = { Monday: 'bg-yellow-400', Tuesday: 'bg-pink-400', Wednesday: 'bg-emerald-500', Thursday: 'bg-orange-500', Friday: 'bg-sky-500' };
            document.getElementById(`tab-${day}`).className = `day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs transition-all duration-200 cursor-pointer shadow-md scale-105 ${activeColors[day]} text-white`;
            renderSchedule(); updateHomeworkSubjectSelect(); renderHomework();
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleList');
            const data = schedules.filter(c => c.day === currentSelectedDay).sort((a,b) => a.start.localeCompare(b.start));
            container.innerHTML = data.length === 0 ? `<p class="text-center text-gray-400 py-6 text-sm">ไม่มีวิชาเรียน</p>` : data.map(c => `
                <div class="p-3 bg-slate-50 border-l-4 border-l-indigo-500 rounded-xl flex justify-between">
                    <div><p class="font-bold text-sm">${c.name}</p><p class="text-[11px] text-slate-500">⏰ ${c.start}-${c.end}</p></div>
                    ${currentUserRole === 'admin' ? `<button onclick="window.deleteSchedule('${c.id}')" class="text-gray-300">✕</button>` : ''}
                </div>`).join('');
        }

        function renderHomework() {
            const container = document.getElementById('homeworkList');
            const data = homeworks.filter(h => h.day === currentSelectedDay);
            container.innerHTML = data.length === 0 ? `<p class="text-center text-gray-400 py-6 text-sm">ไม่มีการบ้าน</p>` : data.map(h => `
                <div class="p-4 bg-white border rounded-xl ${h.status === 'done' ? 'opacity-50' : ''}">
                    <div class="flex justify-between"><p class="text-sm font-bold">${h.title}</p>${currentUserRole === 'admin' ? `<button onclick="window.deleteHomework('${h.id}')" class="text-gray-300">✕</button>` : ''}</div>
                    <p class="text-[11px] text-rose-500 font-bold mt-2">📅 ส่ง: ${h.deadline}</p>
                </div>`).join('');
        }

        window.updateHomeworkSubjectSelect = function() {
            const select = document.getElementById('homeworkSubjectSelect');
            select.innerHTML = schedules.filter(c => c.day === currentSelectedDay).map(c => `<option value="${c.name}">${c.name}</option>`).join('') + `<option value="งานทั่วไป">งานทั่วไป</option>`;
        }

        window.scheduleForm_submit = function(e) { e.preventDefault(); const id = document.getElementById('scheduleId').value || 'sched_' + Date.now(); window.dbSet(window.dbRef(window.db, `schedules/${id}`), { day: document.getElementById('scheduleDay').value, name: document.getElementById('scheduleName').value, start: document.getElementById('scheduleStart').value, end: document.getElementById('scheduleEnd').value, teacher: document.getElementById('scheduleTeacher').value }).then(() => closeModal('scheduleModal')); }
        window.homeworkForm_submit = function(e) { e.preventDefault(); const id = document.getElementById('homeworkId').value || 'hw_' + Date.now(); window.dbSet(window.dbRef(window.db, `homeworks/${id}`), { day: currentSelectedDay, subject: document.getElementById('homeworkSubjectSelect').value, title: document.getElementById('homeworkTitle').value, deadline: document.getElementById('homeworkDeadline').value, status: document.getElementById('homeworkStatus').value, type: document.getElementById('homeworkType').value }).then(() => closeModal('homeworkModal')); }
        window.deleteSchedule = function(id) { if(confirm('ลบ?')) window.dbRemove(window.dbRef(window.db, `schedules/${id}`)); }
        window.deleteHomework = function(id) { if(confirm('ลบ?')) window.dbRemove(window.dbRef(window.db, `homeworks/${id}`)); }

        function checkFirebaseReady() { if (window.db) { window.dbOnValue(window.dbRef(window.db, 'schedules'), (s) => { schedules = Object.keys(s.val()||{}).map(k=>({id:k,...s.val()[k]})); renderSchedule(); }); window.dbOnValue(window.dbRef(window.db, 'homeworks'), (s) => { homeworks = Object.keys(s.val()||{}).map(k=>({id:k,...s.val()[k]})); renderHomework(); }); window.selectDay('Monday'); } else { setTimeout(checkFirebaseReady, 100); } }
        checkFirebaseReady();
    </script>
</body>
</html>
