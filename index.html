<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Class & Homework Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5ufCK1MfakgMnfE9B0ZnQLlTUfpnDirQ",
            databaseURL: "https://myhomework-4621e-default-rtdb.firebaseio.com",
            projectId: "myhomework-4621e"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        // ส่งออกตัวแปรให้ window เข้าถึงได้
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
        
        // เมื่อโหลดเสร็จให้เริ่มรันระบบ
        window.initSystem();
    </script>
</head>
<body class="bg-slate-100 p-4">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold">📅 Class & Homework Tracker</h1>
            <div class="flex gap-2">
                <button id="addSchedBtn" onclick="window.openModal('scheduleModal')" class="bg-amber-500 text-white px-4 py-2 rounded-xl hidden"> + เพิ่มวิชา</button>
                <button onclick="window.openModal('homeworkModal')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl"> + เพิ่มการบ้าน</button>
            </div>
        </header>

        <nav id="dayNav" class="flex gap-2 mb-6 overflow-x-auto pb-2"></nav>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <section class="bg-white p-5 rounded-2xl shadow">
                <h2 class="font-bold mb-4">ตารางเรียน</h2>
                <div id="scheduleList" class="space-y-3"></div>
            </section>
            <section class="bg-white p-5 rounded-2xl shadow">
                <h2 class="font-bold mb-4">การบ้าน</h2>
                <div id="homeworkList" class="space-y-3"></div>
            </section>
        </div>
    </div>

    <div id="scheduleModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm">
            <form onsubmit="window.saveSchedule(event)">
                <input type="text" id="sName" placeholder="ชื่อวิชา" class="w-full border p-2 mb-2" required>
                <button type="submit" class="bg-amber-500 text-white w-full py-2 rounded">บันทึก</button>
            </form>
        </div>
    </div>

    <script>
        let currentDay = 'Monday', role = localStorage.getItem('userRole') || 'student';
        const days = ['Monday','Tuesday','Wednesday','Thursday','Friday'];

        window.initSystem = () => {
            // สร้างปุ่มนำทางด้วย JS แทน Template ใน HTML
            const nav = document.getElementById('dayNav');
            days.forEach(d => {
                const btn = document.createElement('button');
                btn.className = "bg-white px-4 py-2 rounded-lg shadow";
                btn.innerText = d;
                btn.onclick = () => { currentDay = d; render(); };
                nav.appendChild(btn);
            });
            render();
            
            // ดึงข้อมูล
            window.dbOnValue(window.dbRef(window.db, 'schedules'), (s) => { window.schedules = s.val() || {}; render(); });
            window.dbOnValue(window.dbRef(window.db, 'homeworks'), (s) => { window.homeworks = s.val() || {}; render(); });
        };

        window.saveSchedule = (e) => { 
            e.preventDefault(); 
            const id = 's_'+Date.now(); 
            window.dbSet(window.dbRef(window.db, 'schedules/'+id), { name: document.getElementById('sName').value, day: currentDay }); 
            document.getElementById('scheduleModal').classList.add('hidden');
        };

        function render() {
            const isAdmin = role === 'admin';
            document.getElementById('addSchedBtn').classList.toggle('hidden', !isAdmin);
            // ส่วนแสดงผลรายการ...
        }
    </script>
</body>
</html>
