<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอปตารางเรียนและการบ้าน (แท็บชื่อวันเต็ม+สีชัดเจน)</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6">

    <div class="max-w-4xl mx-auto">
        
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📅 Class & Homework Tracker</h1>
                <p class="text-sm text-gray-500">จัดการตารางเรียน งานค้าง และชื่อครูผู้สอน</p>
            </div>
            <div class="flex gap-2">
                <button id="openScheduleBtn" class="bg-amber-500 hover:bg-amber-600 text-white font-medium px-4 py-2 rounded-xl shadow-md transition cursor-pointer text-sm">
                    + เพิ่มวิชาเรียน
                </button>
                <button id="openHomeworkBtn" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2 rounded-xl shadow-md transition cursor-pointer text-sm">
                    + เพิ่มการบ้าน
                </button>
            </div>
        </header>

        <nav class="flex bg-white p-2 rounded-2xl shadow-md mb-6 overflow-x-auto gap-2 border border-slate-200">
            <button onclick="selectDay('Monday')" id="tab-Monday" class="day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer shadow-xs">
                💛 วันจันทร์
            </button>
            <button onclick="selectDay('Tuesday')" id="tab-Tuesday" class="day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer shadow-xs">
                💗 วันอังคาร
            </button>
            <button onclick="selectDay('Wednesday')" id="tab-Wednesday" class="day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer shadow-xs">
                💚 วันพุธ
            </button>
            <button onclick="selectDay('Thursday')" id="tab-Thursday" class="day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer shadow-xs">
                🧡 วันพฤหัสฯ
            </button>
            <button onclick="selectDay('Friday')" id="tab-Friday" class="day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer shadow-xs">
                💙 วันศุกร์
            </button>
        </nav>

        <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
            
            <section class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">📖 ตารางเรียน</h2>
                <div id="scheduleList" class="space-y-3"></div>
            </section>

            <section class="md:col-span-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center gap-2">🔥 การบ้านค้างส่ง</h2>
                <div id="homeworkList" class="space-y-3"></div>
            </section>

        </main>
    </div>

    <div id="scheduleModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold text-gray-800 mb-4">เพิ่มวิชาในตารางเรียน</h3>
            <form id="scheduleForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">วันเรียน</label>
                    <select id="classDayInput" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                        <option value="Monday">วันจันทร์</option>
                        <option value="Tuesday">วันอังคาร</option>
                        <option value="Wednesday">วันพุธ</option>
                        <option value="Thursday">วันพฤหัสบดี</option>
                        <option value="Friday">วันศุกร์</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อวิชา</label>
                    <input type="text" id="classNameInput" required placeholder="เช่น ฟิสิกส์, ภาษาไทย" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">ชื่อครูผู้สอนประจำวิชา</label>
                    <input type="text" id="classTeacherInput" placeholder="เช่น ครูสมชาย, Aj. Sarah" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เวลาเริ่ม</label>
                        <input type="time" id="startTimeInput" required class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">เวลาเลิก</label>
                        <input type="time" id="endTimeInput" required class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                    </div>
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal('scheduleModal')" class="w-1/3 bg-gray-100 text-gray-600 font-medium py-2 rounded-xl">ยกเลิก</button>
                    <button type="submit" class="w-2/3 bg-amber-500 text-white font-medium py-2 rounded-xl">บันทึกวิชา</button>
                </div>
            </form>
        </div>
    </div>

    <div id="homeworkModal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
            <h3 class="text-xl font-bold text-gray-800 mb-4">เพิ่มการบ้านใหม่</h3>
            <form id="homeworkForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">วิชาที่สั่งงาน (ครูผู้สอน)</label>
                    <select id="hwSubjectSelect" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none"></select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">ประเภทงาน</label>
                    <div class="flex gap-4">
                        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                            <input type="radio" name="workType" value="single" checked class="w-4 h-4 accent-indigo-600">
                            👤 งานเดี่ยว
                        </label>
                        <label class="flex items-center gap-2 text-sm text-gray-700 cursor-pointer">
                            <input type="radio" name="workType" value="group" class="w-4 h-4 accent-indigo-600">
                            👥 งานกลุ่ม
                        </label>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">รายละเอียดงาน</label>
                    <textarea id="hwTitleInput" required placeholder="สั่งให้ทำอะไร..." rows="3" class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">กำหนดส่ง</label>
                    <input type="date" id="hwDateInput" required class="w-full px-3 py-2 border border-slate-200 rounded-xl focus:outline-none">
                </div>
                <div class="flex gap-2 pt-2">
                    <button type="button" onclick="closeModal('homeworkModal')" class="w-1/3 bg-gray-100 text-gray-600 font-medium py-2 rounded-xl">ยกเลิก</button>
                    <button type="submit" class="w-2/3 bg-indigo-600 text-white font-medium py-2 rounded-xl">บันทึกงาน</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let currentSelectedDay = 'Monday';
        let schedules = JSON.parse(localStorage.getItem('schedulesData')) || [];
        let homeworks = JSON.parse(localStorage.getItem('homeworksData')) || [];

        // 🌟 ตั้งค่าโค้ดสีประจำวัน (เมื่อแท็บนั้นถูกเลือกใช้งาน)
        const dayStyles = {
            Monday:    { active: 'bg-yellow-400 text-amber-950 border-yellow-500 scale-105', border: 'border-l-yellow-500', bg: 'bg-yellow-50/50' },
            Tuesday:   { active: 'bg-pink-500 text-white border-pink-600 scale-105', border: 'border-l-pink-500', bg: 'bg-pink-50/50' },
            Wednesday: { active: 'bg-emerald-500 text-white border-emerald-600 scale-105', border: 'border-l-emerald-500', bg: 'bg-emerald-50/50' },
            Thursday:  { active: 'bg-orange-500 text-white border-orange-600 scale-105', border: 'border-l-orange-500', bg: 'bg-orange-50/50' },
            Friday:    { active: 'bg-sky-500 text-white border-sky-600 scale-105', border: 'border-l-sky-500', bg: 'bg-sky-50/50' }
        };

        document.getElementById('openScheduleBtn').addEventListener('click', () => openModal('scheduleModal'));
        document.getElementById('openHomeworkBtn').addEventListener('click', () => {
            updateHomeworkSubjectSelect();
            openModal('homeworkModal');
        });

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); }

        // 🌟 ปรับปรุงฟังก์ชันการเลือกแท็บวันให้เปลี่ยนสีตามวันนั้น ๆ แบบชัดเจน
        function selectDay(day) {
            currentSelectedDay = day;
            
            // 1. ล้างสไตล์สีเก่าของทุกแท็บออกก่อน ให้กลับเป็นสีเทาพื้นหลังโปร่งใสธรรมดา
            document.querySelectorAll('.day-tab').forEach(tab => {
                // ล้างคลาสสีที่สุ่มเสี่ยงออกให้หมด
                tab.className = "day-tab flex-1 min-w-[100px] text-center py-3 rounded-xl font-black text-sm transition-all duration-200 cursor-pointer bg-slate-50 text-slate-500 hover:bg-slate-100 border border-slate-200";
            });
            
            // 2. ดึงแท็บปัจจุบันที่กดมาใส่สีสไตล์แบบไฮไลต์ตามที่ตั้งค่าไว้ใน dayStyles
            const activeTab = document.getElementById(`tab-${day}`);
            const style = dayStyles[day].active;
            
            // ลบสไตล์ปกติออกแล้วสาดสไตล์จัดเต็มประจำวันเข้าไป
            activeTab.classList.remove('bg-slate-50', 'text-slate-500', 'hover:bg-slate-100');
            style.split(' ').forEach(className => activeTab.classList.add(className));

            renderSchedule();
            renderHomework();
        }

        // บันทึกวิชาเรียน
        document.getElementById('scheduleForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newClass = {
                id: Date.now(),
                day: document.getElementById('classDayInput').value,
                name: document.getElementById('classNameInput').value,
                teacher: document.getElementById('classTeacherInput').value.trim() || 'ไม่ระบุชื่อครู',
                start: document.getElementById('startTimeInput').value,
                end: document.getElementById('endTimeInput').value
            };
            schedules.push(newClass);
            localStorage.setItem('schedulesData', JSON.stringify(schedules));
            document.getElementById('scheduleForm').reset();
            closeModal('scheduleModal');
            selectDay(newClass.day);
        });

        // บันทึกการบ้าน
        document.getElementById('homeworkForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const selectedType = document.querySelector('input[name="workType"]:checked').value;
            const selectValue = document.getElementById('hwSubjectSelect').value;
            const [subjectName, teacherName] = selectValue.split('|');

            const newHw = {
                id: Date.now(),
                day: currentSelectedDay,
                subject: subjectName,
                teacher: teacherName,
                type: selectedType,
                title: document.getElementById('hwTitleInput').value,
                date: document.getElementById('hwDateInput').value
            };
            
            homeworks.unshift(newHw);
            localStorage.setItem('homeworksData', JSON.stringify(homeworks));

            document.getElementById('homeworkForm').reset();
            document.querySelector('input[name="workType"][value="single"]').checked = true;
            closeModal('homeworkModal');
            renderHomework();
        });

        // วาดตารางเรียน (ปรับสีกรอบตามสีประจำวันที่เลือก)
        function renderSchedule() {
            const container = document.getElementById('scheduleList');
            const todayClasses = schedules.filter(c => c.day === currentSelectedDay);
            if(todayClasses.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-6 text-sm">ไม่มีวิชาเรียนในวันนี้</p>`;
                return;
            }
            todayClasses.sort((a,b) => a.start.localeCompare(b.start));

            const currentDayColor = dayStyles[currentSelectedDay];

            container.innerHTML = todayClasses.map(c => `
                <div class="p-3 ${currentDayColor.bg} border-l-4 ${currentDayColor.border} rounded-xl flex justify-between items-center shadow-xs">
                    <div>
                        <p class="font-bold text-gray-800 text-sm">${c.name}</p>
                        <p class="text-xs text-slate-500 font-medium mt-0.5">ผู้สอน: ${c.teacher}</p>
                        <p class="text-[11px] text-slate-600 font-bold mt-0.5">⏰ ${c.start} - ${c.end} น.</p>
                    </div>
                    <button onclick="deleteSchedule(${c.id})" class="text-gray-300 hover:text-red-500 text-xs font-bold transition cursor-pointer">✕</button>
                </div>
            `).join('');
        }

        // วาดการบ้าน
        function renderHomework() {
            const container = document.getElementById('homeworkList');
            const todayHomeworks = homeworks.filter(h => h.day === currentSelectedDay);

            if(todayHomeworks.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-400 py-6 text-sm">🎉 วันนี้ไม่มีการบ้านค้างส่ง</p>`;
                return;
            }

            container.innerHTML = todayHomeworks.map(h => {
                const typeBadge = h.type === 'group' 
                    ? `<span class="bg-purple-100 text-purple-800 text-[10px] font-extrabold px-2 py-0.5 rounded-md ml-2 border border-purple-200">👥 งานกลุ่ม</span>`
                    : `<span class="bg-teal-100 text-teal-800 text-[10px] font-extrabold px-2 py-0.5 rounded-md ml-2 border border-teal-200">👤 งานเดี่ยว</span>`;

                return `
                    <div class="p-4 bg-white border border-slate-100 rounded-xl shadow-xs flex justify-between items-start gap-4">
                        <div>
                            <div class="flex items-center flex-wrap gap-y-1">
                                <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-2.5 py-0.5 rounded-full">${h.subject}</span>
                                ${typeBadge}
                            </div>
                            
                            <div class="mt-2 flex items-center gap-1.5 text-xs text-slate-500 font-medium">
                                <span class="text-gray-400">👨‍🏫 ครูผู้สั่ง:</span> 
                                <span class="text-indigo-600 bg-indigo-50/50 px-2 py-0.5 rounded-md">${h.teacher}</span>
                            </div>

                            <p class="font-semibold text-gray-800 text-sm mt-3 whitespace-pre-line">${h.title}</p>
                            <p class="text-xs text-slate-400 mt-1">กำหนดส่ง: <span class="text-red-500 font-semibold">${h.date}</span></p>
                        </div>
                        <button onclick="deleteHomework(${h.id})" class="bg-emerald-50 hover:bg-emerald-500 text-emerald-600 hover:text-white border border-emerald-200 hover:border-emerald-500 px-3 py-1.5 rounded-xl text-xs font-bold transition cursor-pointer shrink-0">✓ เสร็จแล้ว</button>
                    </div>
                `;
            }).join('');
        }

        function updateHomeworkSubjectSelect() {
            const select = document.getElementById('hwSubjectSelect');
            const todayClasses = schedules.filter(c => c.day === currentSelectedDay);
            if(todayClasses.length === 0) {
                select.innerHTML = `<option value="วิชาทั่วไป|ไม่ระบุชื่อครู">วิชาทั่วไป (ยังไม่ได้เพิ่มวิชาเรียน)</option>`;
            } else {
                select.innerHTML = todayClasses.map(c => `
                    <option value="${c.name}|${c.teacher}">${c.name} (${c.teacher})</option>
                `).join('');
            }
        }

        function deleteSchedule(id) {
            schedules = schedules.filter(c => c.id !== id);
            localStorage.setItem('schedulesData', JSON.stringify(schedules));
            renderSchedule();
        }

        function deleteHomework(id) {
            homeworks = homeworks.filter(h => h.id !== id);
            localStorage.setItem('homeworksData', JSON.stringify(homeworks));
            renderHomework();
        }

        // รันตั้งต้นให้เปิดที่วันจันทร์
        selectDay('Monday');
    </script>
</body>
</html>
