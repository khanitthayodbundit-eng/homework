<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class & Homework Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ตารางเรียนม.2/4">
    <link class="ios-icon" rel="apple-touch-icon" href="https://raw.githubusercontent.com/khanitthayodbundit-eng/homework/refs/heads/main/icon.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5ufCK1MfakgMnfE9B0ZnQLlTUfpnDirQ",
            authDomain: "myhomework-4621e.firebaseapp.com",
            databaseURL: "https://myhomework-4621e-default-rtdb.firebaseio.com",
            projectId: "myhomework-4621e",
            storageBucket: "myhomework-4621e.firebasestorage.app",
            messagingSenderId: "993446656066",
            appId: "1:993446656066:web:11174ba8bc0e9ff44095db",
            measurementId: "G-Q5KH4YZ1LD"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbPush = push;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-6 flex flex-col justify-between">

    <div class="max-w-4xl mx-auto w-full mb-6">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📅 Class & Homework Tracker</h1>
                <p class="text-sm text-gray-500">ตารางเรียน ชั้น ม. 2/4 (อัปเดต Realtime)</p>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="openScheduleBtn" onclick="window.openModal('scheduleModal')" class="hidden bg-amber-500 hover:bg-amber-600 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition text-sm">+ เพิ่มวิชาเรียน</button>
                <button onclick="window.openModal('homeworkModal')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-4 py-2.5 rounded-xl shadow-md transition text-sm">+ เพิ่มการบ้าน</button>
            </div>
        </header>

        <nav class="flex bg-white p-2 rounded-2xl shadow-md mb-6 overflow-x-auto gap-2 border border-slate-200">
            <button onclick="window.selectDay('Monday')" id="tab-Monday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs">จันทร์</button>
            <button onclick="window.selectDay('Tuesday')" id="tab-Tuesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs">อังคาร</button>
            <button onclick="window.selectDay('Wednesday')" id="tab-Wednesday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs">พุธ</button>
            <button onclick="window.selectDay('Thursday')" id="tab-Thursday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs">พฤหัสฯ</button>
            <button onclick="window.selectDay('Friday')" id="tab-Friday" class="day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs">ศุกร์</button>
        </nav>

        <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
            <section class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4">📖 ตารางเรียน</h2>
                <div id="scheduleList" class="space-y-3"></div>
            </section>

            <section class="md:col-span-3 bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                <h2 class="text-lg font-bold text-gray-800 mb-4">🔥 การบ้าน/ภารกิจ</h2>
                <div id="homeworkList" class="space-y-3"></div>
            </section>
        </main>
    </div>

    <div id="scheduleModal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl">
            <h3 id="scheduleModalTitle" class="text-lg font-bold mb-4">📖 เพิ่มวิชาเรียน</h3>
            <form id="scheduleForm" onsubmit="window.scheduleForm_submit(event)">
                <input type="hidden" id="scheduleId">
                <div class="space-y-4">
                    <select id="scheduleDay" class="w-full text-sm p-2 rounded-lg border border-slate-200"><option value="Monday">จันทร์</option><option value="Tuesday">อังคาร</option><option value="Wednesday">พุธ</option><option value="Thursday">พฤหัสบดี</option><option value="Friday">ศุกร์</option></select>
                    <input type="text" id="scheduleCode" class="w-full text-sm p-2 rounded-lg border border-slate-200" placeholder="รหัสวิชา">
                    <input type="text" id="scheduleName" class="w-full text-sm p-2 rounded-lg border border-slate-200" placeholder="ชื่อวิชา" required>
                    <input type="text" id="scheduleTeacher" class="w-full text-sm p-2 rounded-lg border border-slate-200" placeholder="ชื่อครูผู้สอน">
                    <div class="grid grid-cols-2 gap-2"><input type="time" id="scheduleStart" class="w-full text-sm p-2 rounded-lg border border-slate-200" required><input type="time" id="scheduleEnd" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></div>
                </div>
                <div class="flex gap-2 mt-6"><button type="button" onclick="window.closeModal('scheduleModal')" class="flex-1 py-2 rounded-xl bg-slate-100">ยกเลิก</button><button type="submit" class="flex-1 py-2 rounded-xl bg-amber-500 text-white">บันทึก</button></div>
            </form>
        </div>
    </div>

    <div id="homeworkModal" class="fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 hidden z-50">
        <div class="bg-white rounded-2xl max-w-md w-full p-6 shadow-xl max-h-[90vh] overflow-y-auto">
            <h3 id="homeworkModalTitle" class="text-lg font-bold mb-4">🔥 เพิ่มการบ้าน</h3>
            <form id="homeworkForm" onsubmit="window.homeworkForm_submit(event)">
                <input type="hidden" id="homeworkId">
                <div class="space-y-4">
                    <select id="homeworkSubjectSelect" class="w-full text-sm p-2 rounded-lg border border-slate-200" required></select>
                    <select id="homeworkStatus" class="w-full text-sm p-2 rounded-lg border border-slate-200">
                        <option value="not-started">🔴 ยังไม่เริ่ม</option>
                        <option value="in-progress">🟡 กำลังทำ</option>
                        <option value="done">🟢 เสร็จแล้ว</option>
                    </select>
                    <textarea id="homeworkTitle" rows="3" class="w-full text-sm p-2 rounded-lg border border-slate-200" placeholder="รายละเอียดงาน" required></textarea>
                    <input type="date" id="homeworkDeadline" class="w-full text-sm p-2 rounded-lg border border-slate-200" required>
                </div>
                <div class="flex gap-2 mt-6"><button type="button" onclick="window.closeModal('homeworkModal')" class="flex-1 py-2 rounded-xl bg-slate-100">ยกเลิก</button><button type="submit" class="flex-1 py-2 rounded-xl bg-indigo-600 text-white">บันทึก</button></div>
            </form>
        </div>
    </div>

    <script>
        let currentSelectedDay = 'Monday';
        let schedules = [], homeworks = [];

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');

        window.selectDay = function(day) {
            currentSelectedDay = day;
            document.querySelectorAll('.day-tab').forEach(t => t.className = "day-tab flex-1 min-w-[95px] text-center py-3 rounded-xl font-black text-xs bg-white border border-slate-200");
            document.getElementById(`tab-${day}`).className += " bg-indigo-600 text-white border-indigo-600";
            renderSchedule();
            renderHomework();
        }

        function renderSchedule() {
            const container = document.getElementById('scheduleList');
            const data = schedules.filter(c => c.day === currentSelectedDay);
            container.innerHTML = data.map(c => `
                <div class="p-3 bg-slate-50 border-l-4 border-indigo-500 rounded-xl">
                    <p class="font-bold text-sm">${c.name} (${c.code})</p>
                    <p class="text-xs text-slate-500">${c.teacher}</p>
                </div>`).join('');
        }

        function renderHomework() {
            const container = document.getElementById('homeworkList');
            const data = homeworks.filter(h => h.day === currentSelectedDay);
            container.innerHTML = data.map(h => {
                let badge = h.status === 'done' ? '🟢 เสร็จแล้ว' : (h.status === 'in-progress' ? '🟡 กำลังทำ' : '🔴 ยังไม่เริ่ม');
                return `
                    <div class="p-4 border rounded-xl flex items-center gap-3">
                        <div class="flex-1">
                            <p class="text-xs font-bold text-indigo-600">${h.subject}</p>
                            <p class="text-sm">${h.title}</p>
                            <span class="text-[10px] font-bold">${badge}</span>
                        </div>
                    </div>`;
            }).join('');
        }

        window.updateHomeworkSubjectSelect = function() {
            const select = document.getElementById('homeworkSubjectSelect');
            select.innerHTML = schedules.filter(c => c.day === currentSelectedDay).map(c => `<option value="${c.name} (${c.code}) - ${c.teacher}">${c.name} (${c.code}) - ${c.teacher}</option>`).join('');
        }

        window.homeworkForm_submit = function(e) {
            e.preventDefault();
            const id = document.getElementById('homeworkId').value || 'hw_' + Date.now();
            window.dbSet(window.dbRef(window.db, `homeworks/${id}`), {
                day: currentSelectedDay,
                subject: document.getElementById('homeworkSubjectSelect').value,
                status: document.getElementById('homeworkStatus').value,
                title: document.getElementById('homeworkTitle').value,
                deadline: document.getElementById('homeworkDeadline').value
            }).then(() => closeModal('homeworkModal'));
        }

        // Init
        window.dbOnValue(window.dbRef(window.db, 'schedules'), (s) => { 
            const d = s.val(); 
            schedules = d ? Object.keys(d).map(k => ({id: k, ...d[k]})) : []; 
            renderSchedule(); 
            updateHomeworkSubjectSelect(); 
        });
        window.dbOnValue(window.dbRef(window.db, 'homeworks'), (s) => { 
            const d = s.val(); 
            homeworks = d ? Object.keys(d).map(k => ({id: k, ...d[k]})) : []; 
            renderHomework(); 
        });
        window.selectDay('Monday');
    </script>
</body>
</html>
