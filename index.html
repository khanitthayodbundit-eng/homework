<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Class & Homework Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/khanitthayodbundit-eng/homework/refs/heads/main/icon.png">

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB5ufCK1MfakgMnfE9B0ZnQLlTUfpnDirQ",
            databaseURL: "https://myhomework-4621e-default-rtdb.firebaseio.com",
            projectId: "myhomework-4621e"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.dbRef = ref;
        window.dbSet = set;
        window.dbOnValue = onValue;
        window.dbRemove = remove;
        window.dbUpdate = update;
        window.dispatchEvent(new Event('firebase-ready'));
    </script>
</head>
<body class="bg-slate-100 min-h-screen p-4">

    <div class="max-w-4xl mx-auto w-full mb-6">
        <header class="flex flex-col sm:flex-row justify-between items-center gap-4 mb-6">
            <div>
                <h1 class="text-2xl font-bold text-slate-800">📅 Class & Homework Tracker</h1>
            </div>
            <div class="flex gap-2 w-full sm:w-auto">
                <button id="openScheduleBtn" onclick="window.openModal('scheduleModal')" class="bg-amber-500 text-white px-4 py-2 rounded-xl hidden"> + เพิ่มวิชาเรียน</button>
                <button onclick="window.openModal('homeworkModal')" class="bg-indigo-600 text-white px-4 py-2 rounded-xl"> + เพิ่มการบ้าน</button>
            </div>
        </header>

        <nav class="flex bg-white p-2 rounded-2xl shadow-md mb-6 overflow-x-auto gap-2">
            <button onclick="window.selectDay('Monday')" class="day-tab flex-1 py-3 text-xs font-black">จันทร์</button>
            <button onclick="window.selectDay('Tuesday')" class="day-tab flex-1 py-3 text-xs font-black">อังคาร</button>
            <button onclick="window.selectDay('Wednesday')" class="day-tab flex-1 py-3 text-xs font-black">พุธ</button>
            <button onclick="window.selectDay('Thursday')" class="day-tab flex-1 py-3 text-xs font-black">พฤหัสฯ</button>
            <button onclick="window.selectDay('Friday')" class="day-tab flex-1 py-3 text-xs font-black">ศุกร์</button>
        </nav>

        <main class="grid grid-cols-1 md:grid-cols-5 gap-6">
            <section class="md:col-span-2 bg-white p-5 rounded-2xl shadow-sm"><h2 class="font-bold mb-4">📖 ตารางเรียน</h2><div id="scheduleList" class="space-y-3"></div></section>
            <section class="md:col-span-3 bg-white p-5 rounded-2xl shadow-sm"><h2 class="font-bold mb-4">🔥 การบ้าน</h2><div id="homeworkList" class="space-y-3"></div></section>
        </main>
    </div>

    <footer class="text-center py-6">
        <select id="userRoleSelect" onchange="window.changeUserRole(this.value)" class="text-xs p-2 rounded-lg border">
            <option value="student">👤 ผู้ใช้ทั่วไป</option>
            <option value="admin">👑 Admin</option>
        </select>
    </footer>

    <div id="scheduleModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden"><div class="bg-white p-6 rounded-2xl w-full max-w-sm"><h3 class="font-bold mb-4">วิชาเรียน</h3><form id="scheduleForm" onsubmit="window.scheduleForm_submit(event)"><input type="hidden" id="scheduleId"><input type="text" id="scheduleName" class="w-full p-2 border rounded-lg mb-2" placeholder="ชื่อวิชา" required><div class="flex gap-2 mt-4"><button type="button" onclick="window.closeModal('scheduleModal')">ยกเลิก</button><button type="submit" class="bg-amber-500 text-white px-4 py-2 rounded-lg">บันทึก</button></div></form></div></div>
    <div id="homeworkModal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden"><div class="bg-white p-6 rounded-2xl w-full max-w-sm"><h3 class="font-bold mb-4">การบ้าน</h3><form id="homeworkForm" onsubmit="window.homeworkForm_submit(event)"><textarea id="homeworkTitle" class="w-full p-2 border rounded-lg" placeholder="รายละเอียดงาน" required></textarea><div class="flex gap-2 mt-4"><button type="button" onclick="window.closeModal('homeworkModal')">ยกเลิก</button><button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-lg">บันทึก</button></div></form></div></div>

    <script>
        let currentSelectedDay = 'Monday', schedules = [], homeworks = [];
        let currentUserRole = localStorage.getItem('userRole') || 'student';

        window.changeUserRole = (role) => {
            currentUserRole = role;
            localStorage.setItem('userRole', role);
            updateUI();
        };

        function updateUI() {
            const isAdmin = currentUserRole === 'admin';
            document.getElementById('openScheduleBtn').classList.toggle('hidden', !isAdmin);
            renderAll();
        }

        window.scheduleForm_submit = (e) => { e.preventDefault(); const id = document.getElementById('scheduleId').value || 's_'+Date.now(); window.dbSet(window.dbRef(window.db, 'schedules/'+id), { name: document.getElementById('scheduleName').value, day: currentSelectedDay }).then(() => closeModal('scheduleModal')); };
        window.homeworkForm_submit = (e) => { e.preventDefault(); const id = document.getElementById('homeworkId').value || 'h_'+Date.now(); window.dbSet(window.dbRef(window.db, 'homeworks/'+id), { title: document.getElementById('homeworkTitle').value, day: currentSelectedDay, status: 'pending' }).then(() => closeModal('homeworkModal')); };

        window.openModal = (id) => document.getElementById(id).classList.remove('hidden');
        window.closeModal = (id) => document.getElementById(id).classList.add('hidden');
        window.selectDay = (day) => { currentSelectedDay = day; renderAll(); };

        function renderAll() {
            const isAdmin = currentUserRole === 'admin';
            document.getElementById('scheduleList').innerHTML = schedules.filter(s => s.day === currentSelectedDay).map(s => `
                <div class="p-3 border-l-4 border-amber-400 bg-amber-50 rounded-xl flex justify-between">
                    <span>${s.name}</span>
                    ${isAdmin ? `<button onclick="window.dbRemove(window.dbRef(window.db, 'schedules/${s.id}'))" class="text-red-500">✕</button>` : ''}
                </div>`).join('');

            document.getElementById('homeworkList').innerHTML = homeworks.filter(h => h.day === currentSelectedDay).map(h => `
                <div class="p-3 border rounded-xl flex justify-between">
                    <span>${h.title}</span>
                    <input type="checkbox" ${h.status==='done'?'checked':''} onclick="window.dbUpdate(window.dbRef(window.db, 'homeworks/${h.id}'), {status: '${h.status==='done'?'pending':'done'}'})">
                </div>`).join('');
        }

        window.addEventListener('firebase-ready', () => {
            document.getElementById('userRoleSelect').value = currentUserRole;
            window.dbOnValue(window.dbRef(window.db, 'schedules'), (s) => { const v=s.val(); schedules=v?Object.keys(v).map(k=>({id:k,...v[k]})):[]; renderAll(); });
            window.dbOnValue(window.dbRef(window.db, 'homeworks'), (s) => { const v=s.val(); homeworks=v?Object.keys(v).map(k=>({id:k,...v[k]})):[]; renderAll(); });
            updateUI();
        });
    </script>
</body>
</html>
